<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的主页</title>
    <link rel="stylesheet" href="chrome-homepage.css?v=20260429">
</head>
<body>
    <div class="page-shell">
        <header class="top-bar">
            <div class="brand">
                <div class="brand-icon">
                    <div class="brand-circle brand-blue"></div>
                    <div class="brand-circle brand-red"></div>
                    <div class="brand-circle brand-yellow"></div>
                    <div class="brand-circle brand-green"></div>
                </div>
                <div class="brand-text">My  Home</div>
            </div>

            <div class="profile-panel" id="profilePanel">
                <div class="profile-avatar" id="profileAvatar" style="display:none;">
                    <img src="" alt="GitHub 头像">
                </div>
                <button class="login-button" id="githubLoginButton" type="button">登录 GitHub</button>
                <div class="profile-status" id="profileStatus">未登录</div>
            </div>
        </header>

        <main class="hero-section">
            <div class="hero-card">
                <div class="hero-title">你想去哪?</div>
                <div class="search-meta-row">
                    <div class="search-engine-label">搜索引擎：</div>
                    <div class="search-engine-selector" id="searchEngineSelector"></div>
                </div>
                <form id="searchForm" class="search-form">
                    <input id="searchInput" class="search-input" type="search" placeholder="搜索或输入网址" autocomplete="off">
                    <button class="search-submit" type="submit">搜索</button>
                </form>
                <div class="search-hint" id="searchHint">按 Ctrl+K 或 / 键快速聚焦，输入网址或搜索关键词。</div>
                <div class="search-suggestions" id="searchSuggestions"></div>
                <div class="hint-row">
                    <span class="hint-label">快捷导航：</span>
                    <a href="https://www.google.com" target="_blank" rel="noreferrer">Google</a>
                    <a href="https://github.com" target="_blank" rel="noreferrer">GitHub</a>
                    <a href="https://mail.google.com" target="_blank" rel="noreferrer">Gmail</a>
                    <a href="https://www.youtube.com" target="_blank" rel="noreferrer">YouTube</a>
                </div>
            </div>
        </main>

        <section class="history-card">
            <div class="section-title">最近访问</div>
            <div class="history-grid" id="historyGrid"></div>
        </section>

        <section class="shortcuts-card">
            <div class="section-title-row">
                <div class="section-title">常用网站</div>
                <div class="section-actions">
                    <button class="secondary-btn" id="editShortcutsButton" type="button">编辑常用网站</button>
                    <button class="secondary-btn" id="addShortcutButton" type="button">新增网站</button>
                </div>
            </div>
            <div class="shortcut-editor" id="shortcutEditor" style="display:none;"></div>
            <div class="shortcut-grid" id="shortcutGrid"></div>
        </section>

        <section class="oauth-card" id="oauthCard">
            <div class="section-title">GitHub 登录状态</div>
            <div class="oauth-content" id="oauthContent">
                <p>点击「登录 GitHub」后，页面将跳转 GitHub 授权。</p>
                <p>登录成功后，页面会在当前仓库中创建或更新一个 Issue 来保存你的常用网站数据。</p>
            </div>
        </section>
    </div>

    <script src="chrome-homepage.js?v=20260429"></script>
</body>
</html>
